name: Fetch Student Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true   # ← cancel older run if a new one starts

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0   # ← full history so rebase always works

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch APIs and save data
        env:
          API_URL_1: ${{ secrets.API_URL_1 }}
          API_URL_2: ${{ secrets.API_URL_2 }}
        run: python fetch_data.py

      - name: Commit and push updated history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # ── Pull latest BEFORE committing ──────────────────────────────
          git pull --rebase origin main

          git add data/history.json

          # Only commit + push if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to commit, skipping push."
          else
            git commit -m "chore: update student data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
